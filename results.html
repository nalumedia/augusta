// ─── Helpers ─────────────────────────────────────────────────
function flagFor(code) {
  if (!code || code.length !== 2) return "🏳️";
  const A = 127397;
  return String.fromCodePoint(code.charCodeAt(0) + A, code.charCodeAt(1) + A);
}
function scoreToPar(s) { return s - PAR; }
function formatPar(tp) { return tp === 0 ? "E" : tp > 0 ? "+" + tp : String(tp); }
function parClass(tp) { return tp < 0 ? "under" : tp > 0 ? "over" : "even"; }
function tourChip(name) {
  if (LIV_PLAYERS.has(name)) return `<span class="tour-chip chip-liv">LIV</span>`;
  return "";
}
function avg(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }

// ─── Build Masters leaderboard ───────────────────────────────
const mastersLB = Object.entries(R1)
  .map(([name, score]) => ({ name, score, toPar: score - PAR }))
  .sort((a, b) => a.score - b.score);
let pos = 1;
for (let i = 0; i < mastersLB.length; i++) {
  if (i > 0 && mastersLB[i].score > mastersLB[i-1].score) pos = i + 1;
  mastersLB[i].pos = pos;
  mastersLB[i].posStr = (i > 0 && mastersLB[i].score === mastersLB[i-1].score) ? "T" + pos : String(pos);
}

// ─── Build teams ─────────────────────────────────────────────
const poolPlayerSet = new Set();
const TEAMS = RAW_TEAMS.map(raw => {
  const players = raw.players.map(p => {
    const name = normalize(p);
    poolPlayerSet.add(name);
    const r1 = R1[name] ?? null;
    const toPar = r1 !== null ? scoreToPar(r1) : null;
    const country = COUNTRIES[name] || "US";
    const entry = mastersLB.find(e => e.name === name);
    const posStr = entry ? entry.posStr : "—";
    return { name, r1, toPar, country, posStr };
  });
  const sorted = [...players].sort((a, b) => {
    if (a.r1 === null && b.r1 === null) return 0;
    if (a.r1 === null) return 1; if (b.r1 === null) return -1;
    return a.r1 - b.r1;
  });
  const counting = sorted.slice(0, 4);
  const dropped = sorted.slice(4);
  const best4Total = counting.reduce((s, p) => s + (p.r1 ?? MC_PENALTY/4), 0);
  const best4ToPar = best4Total - (PAR * 4);
  const all6Total = sorted.reduce((s, p) => s + (p.r1 ?? MC_PENALTY/4), 0);
  const projTotal = counting.reduce((sum, p) => {
    const mean4 = PROJ_MEAN[p.name] || 293;
    const perRound = mean4 / 4;
    return sum + (p.r1 || 73) + perRound * 3;
  }, 0);

  // Archetype tags
  const livCount = sorted.filter(p => LIV_PLAYERS.has(p.name)).length;
  const champCount = sorted.filter(p => PAST_CHAMPS[p.name] !== undefined && PAST_CHAMPS[p.name] !== "").length;
  const heroCount = sorted.filter(p => AUGUSTA_HEROES.has(p.name)).length;

  return {
    owner: raw.owner, team: raw.team || raw.owner,
    players: sorted, counting, dropped,
    best4Total, best4ToPar, all6Total,
    projTotal: Math.round(projTotal * 10) / 10,
    livCount, champCount, heroCount
  };
});
TEAMS.sort((a, b) => a.best4Total - b.best4Total || a.all6Total - b.all6Total);
let teamPos = 1;
for (let i = 0; i < TEAMS.length; i++) {
  if (i > 0 && TEAMS[i].best4Total > TEAMS[i-1].best4Total) teamPos = i + 1;
  TEAMS[i].pos = teamPos;
}

// Pick counts
const pickCounts = {};
TEAMS.forEach(t => t.players.forEach(p => { pickCounts[p.name] = (pickCounts[p.name] || 0) + 1; }));

// LIV vs PGA in pool
const livPoolScores = [];
const pgaPoolScores = [];
poolPlayerSet.forEach(name => {
  const r1 = R1[name];
  if (r1 == null) return;
  if (LIV_PLAYERS.has(name)) livPoolScores.push(r1); else pgaPoolScores.push(r1);
});

// Past champions performance
const champScores = Object.keys(PAST_CHAMPS)
  .filter(n => PAST_CHAMPS[n] && R1[n] != null)
  .map(n => ({ name: n, score: R1[n], years: PAST_CHAMPS[n] }));
champScores.sort((a, b) => a.score - b.score);

// Augusta heroes performance
const heroScores = [...AUGUSTA_HEROES].filter(n => R1[n] != null)
  .map(n => ({ name: n, score: R1[n] }));
heroScores.sort((a, b) => a.score - b.score);

// Teams with most LIV exposure
const livTeams = [...TEAMS].sort((a, b) => b.livCount - a.livCount);

// Chalk vs contrarian: top 6 most-picked players
const chalkNames = Object.entries(pickCounts).sort((a,b) => b[1]-a[1]).slice(0,6).map(e => e[0]);
const chalkSet = new Set(chalkNames);

  html += `<div style="background:var(--card2);border-radius:6px;padding:12px;text-align:center">
    <div style="font-size:24px;font-weight:700;color:var(--gold)">${TEAMS.filter(t=>t.pos===1).length}</div>
    <div style="font-size:11px;color:var(--muted)">teams tied for 1st</div>
  </div>`;
  html += `</div></div>`;

  // ─── Masters Tournament Leaderboard ────────────────────────
  html += `<div class="card">
    <h2>Masters Tournament Leaderboard — Round 1</h2>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">• = picked by at least one pool team</div>
    <div class="masters-lb"><table>
      <thead><tr><th>Pos</th><th>Player</th><th></th><th class="num">R1</th><th class="num">To Par</th></tr></thead>
      <tbody>`;
  mastersLB.forEach(e => {
    const inPool = poolPlayerSet.has(e.name);
    const flag = flagFor(COUNTRIES[e.name] || "US");
    const pCls = parClass(e.toPar);
    html += `<tr class="${inPool ? "pool-player" : ""}">
      <td>${e.posStr}</td>
      <td>${flag} ${e.name}${tourChip(e.name)}${inPool ? " •" : ""}</td>
      <td></td>
      <td class="num">${e.score}</td>
      <td class="num ${pCls}" style="font-weight:600">${formatPar(e.toPar)}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;

  // Footer
  html += `<div class="footer">
    2026 Masters Pool · <a href="index.html">Open Predictor</a><br>
    Scores via ESPN · Updated after Round 1
  </div>`;

  app.innerHTML = html;
}

function toggleTeam(el) { el.classList.toggle("expanded"); }
render();
</script>
</body>
</html>
