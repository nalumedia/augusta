<style>
  :root {

    --gold: #d4a847; --cream: #f5f1e6; --bg: #0a1a10;
    --card: #11261a; --card2: #163020; --border: #234c34;
    --text: #e8e4d2; --muted: #8fa294; --accent: #f4c542;
    --bad: #c44a3a; --red: #e85545; --birdie: #4caf50;
    --eagle: #2196f3; --bogey: #e8a040; --dbl: #e06030;
    --liv: #e8a898; --pga: #7ed490;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",sans-serif;font-size:14px;line-height:1.5}
  header{background:linear-gradient(135deg,var(--green-dk),var(--green));padding:20px 28px;border-bottom:2px solid var(--gold)}
  header h1{font-size:22px;color:var(--cream);letter-spacing:.3px}
  header .subtitle{color:var(--cream);opacity:.75;font-size:13px;margin-top:2px}
  header .live-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 1.5s infinite;margin-right:6px;vertical-align:middle}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .container{max-width:1200px;margin:0 auto;padding:20px}

  .prize-banner{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  .prize-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center}
  .prize-card.first{border-color:var(--gold);background:linear-gradient(135deg,var(--green-dk),var(--green))}
  .prize-card .place{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .prize-card .amount{font-size:26px;font-weight:700;color:var(--gold);margin-top:4px;font-variant-numeric:tabular-nums}
  .prize-card.first .amount{font-size:32px}
  .prize-card .pct{font-size:11px;color:var(--muted);margin-top:2px}

  .round-status{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .round-status .round-label{font-size:13px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
  .round-status .round-info{font-size:13px;color:var(--muted)}
  .round-dots{display:flex;gap:6px;margin-left:auto}
  .round-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;border:2px solid var(--border);color:var(--muted)}
  .round-dot.active{border-color:var(--gold);color:var(--gold);background:rgba(212,168,71,.15);animation:pulse 1.5s infinite}
  .round-dot.done{border-color:var(--green-lt);color:var(--green-lt);background:rgba(42,143,80,.15)}

  .broadcast{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:20px;line-height:1.7;font-size:14px}
  .broadcast h2{font-size:14px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:12px}
  .broadcast p{margin-bottom:10px}
  .broadcast .quote{border-left:3px solid var(--gold);padding-left:12px;margin:12px 0;font-style:italic;color:var(--cream)}
  .broadcast .callout{display:inline-block;background:rgba(212,168,71,.15);border:1px solid var(--gold);border-radius:6px;padding:2px 8px;font-weight:600;color:var(--gold);font-size:13px}
  .broadcast .red{color:var(--bad);font-weight:600}
  .broadcast .green{color:var(--birdie);font-weight:600}

  .insight-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:20px}
  .insight-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px}
  .insight-card h3{font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-bottom:10px}
  .insight-card .stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(35,76,52,.3);font-size:13px}
  .insight-card .stat-row:last-child{border-bottom:none}
  .insight-card .stat-label{color:var(--muted)}
  .insight-card .stat-val{font-weight:600;font-variant-numeric:tabular-nums}

  .vs-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;text-align:center}
  .vs-side{padding:12px}
  .vs-side .vs-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .vs-side .vs-score{font-size:28px;font-weight:700;margin-top:4px;font-variant-numeric:tabular-nums}
  .vs-side .vs-detail{font-size:11px;color:var(--muted);margin-top:2px}
  .vs-divider{font-size:20px;font-weight:700;color:var(--muted)}

  .bar-chart{display:flex;flex-direction:column;gap:6px}
  .bar-row{display:grid;grid-template-columns:100px 1fr 50px;gap:8px;align-items:center;font-size:12px}
  .bar-label{text-align:right;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{height:20px;background:var(--card2);border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width .5s}
  .bar-val{font-weight:600;font-variant-numeric:tabular-nums;font-size:12px}

  .leaderboard{display:flex;flex-direction:column;gap:8px}
  .team-row{background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;overflow:hidden}
  .team-row:hover{border-color:var(--green-lt)}
  .team-row.expanded{border-color:var(--gold)}
  .team-row.first-place{box-shadow:0 0 0 2px var(--gold)}
  .team-header{display:grid;grid-template-columns:48px 1fr auto auto;align-items:center;padding:12px 16px;gap:12px}
  .team-pos{font-size:20px;font-weight:700;color:var(--gold);text-align:center;font-variant-numeric:tabular-nums;min-width:36px}
  .team-pos.top3{color:var(--accent)}
  .team-info{display:flex;flex-direction:column}
  .team-name{font-size:15px;font-weight:600}
  .team-owner{font-size:12px;color:var(--muted)}
  .team-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:6px;font-weight:600;vertical-align:middle}
  .team-score{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;text-align:right;min-width:60px}
  .team-score.under{color:var(--birdie)}.team-score.over{color:var(--bad)}.team-score.even{color:var(--text)}
  .team-total-strokes{font-size:12px;color:var(--muted);text-align:right}
  .team-proj{font-size:11px;color:var(--muted);text-align:right;padding-right:16px}
  .team-proj .proj-val{color:var(--cream);font-weight:500}
  .move{font-size:12px;margin-left:6px;font-weight:600}
  .move.up{color:var(--birdie)}.move.down{color:var(--bad)}.move.flat{color:var(--muted)}

  .team-detail{display:none;padding:0 16px 14px}
  .team-row.expanded .team-detail{display:block}
  .player-grid{display:grid;gap:6px}
  .player-line{display:grid;grid-template-columns:24px 1fr auto auto auto auto auto auto auto;align-items:center;gap:6px;padding:6px 10px;background:var(--card2);border-radius:5px;font-size:13px}
  .player-line.counting{border-left:3px solid var(--gold)}
  .player-line.dropped{opacity:.45;border-left:3px solid transparent}
  .player-flag{font-size:16px}
  .player-name{font-weight:500}
  .player-r{font-variant-numeric:tabular-nums;text-align:right;min-width:28px;font-size:12px}
  .player-par{font-variant-numeric:tabular-nums;text-align:right;font-weight:600;min-width:36px}
  .player-par.under{color:var(--birdie)}.player-par.over{color:var(--bad)}.player-par.even{color:var(--muted)}
  .player-pos{font-size:11px;color:var(--muted);text-align:right;min-width:36px}
  .counting-label{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .dropped-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:6px;margin-bottom:4px}
  .player-status{font-size:11px;text-align:right;min-width:56px;white-space:nowrap}
  .ps-live{color:var(--accent);font-weight:600}.ps-live .live-dot{margin-right:3px}
  .ps-tee{color:var(--muted);font-style:italic;font-size:10px}
  .ps-done{color:var(--green-lt);font-size:10px;font-weight:600}
  .ps-mc{color:var(--bad);font-weight:700;font-size:10px}
  .player-today{font-size:12px;text-align:right;min-width:36px;font-weight:700;font-variant-numeric:tabular-nums}
  .player-line.on-course{border-left:3px solid var(--accent);background:rgba(244,197,66,.06)}
  .team-live-summary{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
  .team-live-summary span{display:inline-flex;align-items:center;gap:3px}
  .tour-chip{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;line-height:16px;vertical-align:middle;margin-left:4px}
  .chip-liv{background:rgba(232,168,152,.25);color:var(--liv)}

  .card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-top:20px}
  .card h2{font-size:14px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:12px}
  .masters-lb{max-height:400px;overflow-y:auto}
  .masters-lb table{width:100%;border-collapse:collapse;font-size:13px}
  .masters-lb th{padding:6px 8px;text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.4px;font-weight:500;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card)}
  .masters-lb td{padding:5px 8px;border-bottom:1px solid rgba(35,76,52,.3)}
  .masters-lb tr.pool-player{background:rgba(212,168,71,.08)}
  .masters-lb .num{text-align:right;font-variant-numeric:tabular-nums}

  .toggle-row{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
  .toggle-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
  .toggle-btn.active{background:var(--green);border-color:var(--green-lt);color:var(--cream)}
  .toggle-btn:hover{border-color:var(--green-lt);color:var(--cream)}
  .refresh-btn{background:var(--gold);color:#1a1200;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;margin-left:auto}
  .refresh-btn:hover{background:#e8ba52}

  .rules-card{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
  .rule-item{background:var(--card2);border-radius:6px;padding:10px 12px;font-size:12px}
  .rule-item .rule-label{color:var(--gold);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .nav-link{display:inline-block;margin-top:8px;color:var(--gold);text-decoration:none;font-size:12px;opacity:.8}
  .nav-link:hover{opacity:1;text-decoration:underline}
  .footer{text-align:center;padding:30px 20px;color:var(--muted);font-size:12px}
  .footer a{color:var(--gold);text-decoration:none}
  .updated{font-size:11px;color:var(--muted);text-align:right;padding:4px 0}

  /* ═══ Augusta National–style scoreboard ═══ */
  .scoreboard{margin-bottom:20px;position:relative;filter:drop-shadow(0 4px 16px rgba(0,0,0,.45))}
  /* The arch / dome top */
  .sb-arch{background:linear-gradient(180deg,#e8e2d0 0%,#f0ebdb 100%);
    border-radius:50% 50% 0 0 / 28px 28px 0 0;
    border:3px solid #b8a870;border-bottom:none;
    padding:14px 20px 6px;text-align:center;position:relative;overflow:hidden}
  .sb-arch::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#006633,#2e8b57,#006633)}
  .sb-arch h2{font-family:Georgia,"Times New Roman",serif;font-size:28px;font-weight:900;
    color:#1a1a1a;letter-spacing:6px;text-transform:uppercase;margin:0;
    text-shadow:1px 1px 0 rgba(255,255,255,.5)}
  .sb-arch .sb-subtitle{font-size:11px;color:#6b6348;letter-spacing:2px;text-transform:uppercase;margin-top:2px;font-weight:600}
  /* Main body */
  .sb-body{background:#f0ebdb;border:3px solid #b8a870;border-top:none;overflow:hidden}
  .sb-controls{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;
    background:linear-gradient(180deg,#e0dac8,#f0ebdb);border-bottom:1px solid #c8c0a0}
  .sb-controls .sb-mode{font-size:11px;color:#6b6348;font-weight:600;letter-spacing:.5px}
  .scoreboard-refresh{background:linear-gradient(180deg,#006633,#004d26);color:#f0ebdb;
    border:1px solid #338855;padding:5px 14px;border-radius:4px;cursor:pointer;
    font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;
    text-shadow:0 1px 1px rgba(0,0,0,.3)}
  .scoreboard-refresh:hover{background:linear-gradient(180deg,#008844,#006633);transform:scale(1.02)}
  .sb-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .sb-table{width:100%;border-collapse:collapse;font-size:14px;min-width:560px}
  /* Green header row */
  .sb-table thead{position:sticky;top:0;z-index:2}
  .sb-table th{background:linear-gradient(180deg,#006633,#004d26);color:#f0ebdb;
    padding:7px 10px;font-size:10px;font-weight:700;letter-spacing:1.5px;
    text-transform:uppercase;text-align:center;
    border-bottom:2px solid #002a14;font-family:Arial,Helvetica,sans-serif}
  .sb-table th:first-child{text-align:center;width:52px;border-right:1px solid #005530}
  .sb-table th:nth-child(2){text-align:left;min-width:170px;border-right:1px solid #005530}
  .sb-table th.sb-rd{min-width:50px;border-right:1px solid #005530}
  .sb-table th:last-child{border-right:none}
  /* Cells */
  .sb-table td{padding:7px 10px;text-align:center;
    border-bottom:1px solid #cdc5a8;border-right:1px solid #d8d0b8;
    background:#f0ebdb;color:#1a1a1a;font-weight:700;font-size:15px;
    font-family:Georgia,"Times New Roman",serif;font-variant-numeric:tabular-nums}
  .sb-table td:last-child{border-right:none}
  .sb-table td:first-child{border-right:1px solid #cdc5a8;font-size:13px;color:#6b6348;font-family:Arial,sans-serif}
  .sb-table td:nth-child(2){text-align:left;font-weight:800;font-size:14px;letter-spacing:1px;
    text-transform:uppercase;font-family:Arial,Helvetica,sans-serif;border-right:1px solid #cdc5a8}
  /* Alternating rows */
  .sb-table tr:nth-child(even) td{background:#e8e2ce}
  .sb-table tr:hover td{background:#ddd7c0}
  /* First place gold accent */
  .sb-table tr.sb-first td{background:linear-gradient(90deg,rgba(212,168,71,.18),rgba(212,168,71,.08))}
  .sb-table tr.sb-first:hover td{background:linear-gradient(90deg,rgba(212,168,71,.28),rgba(212,168,71,.15))}
  .sb-table tr.sb-first td:first-child{background:rgba(212,168,71,.25)}
  /* Score colors — Augusta uses RED for under par */
  .sb-under{color:#c41e2a;font-weight:900}
  .sb-over{color:#1a1a1a;font-weight:700}
  .sb-even{color:#1a1a1a;font-weight:700}
  .sb-total-cell{font-size:17px;font-weight:900;letter-spacing:1px}
  .sb-move{font-size:10px;font-weight:700;margin-left:4px;font-family:Arial,sans-serif;vertical-align:middle}
  .sb-move.up{color:#006633}.sb-move.dn{color:#c41e2a}.sb-move.fl{color:#999}
  .sb-empty{color:#b8b098;font-weight:400;font-size:12px}
  .sb-mc{font-size:8px;color:#c41e2a;font-weight:800;display:block;line-height:1;letter-spacing:.5px;font-family:Arial,sans-serif}
  .sb-flag{display:inline-block;width:14px;height:10px;position:relative;margin-left:2px;vertical-align:middle}
  .sb-flag::before{content:"🏌️";font-size:10px}
  .sb-live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#c41e2a;animation:pulse 1.5s infinite;margin-left:4px;vertical-align:middle}
  /* Bottom bar */
  .sb-footer{background:linear-gradient(180deg,#006633,#004d26);padding:6px 12px;
    display:flex;align-items:center;justify-content:space-between;
    font-size:10px;color:rgba(240,235,219,.7);letter-spacing:.5px}
  .sb-footer a{color:#d4a847;text-decoration:none;font-weight:600}
  .sb-footer a:hover{text-decoration:underline}

  @media(max-width:700px){
    .prize-banner{grid-template-columns:1fr}.team-header{grid-template-columns:40px 1fr auto}
    .team-proj{display:none}
    .player-line{grid-template-columns:22px 1fr repeat(4,28px) 32px 52px 36px;gap:3px;padding:4px 6px;font-size:12px}
    .player-r{font-size:11px}.player-today{font-size:11px;min-width:28px}.player-status{font-size:10px;min-width:44px}
    .insight-grid{grid-template-columns:1fr}.bar-row{grid-template-columns:80px 1fr 40px}
    .sb-arch h2{font-size:20px;letter-spacing:3px}
    .sb-table{font-size:12px}.sb-table td,.sb-table th{padding:4px 6px}
    .sb-table td{font-size:13px}.sb-total-cell{font-size:14px}
    .sb-table th:nth-child(2){min-width:120px}
  }
</style>
</head>

function playerTotal(name){
  const r1=R1[name]??null,r2=R2[name]??null,r3=R3[name]??null,r4=R4[name]??null;
  if(r1==null)return null;
  if(MC.has(name)){const raw=(r1||0)+(r2||0);return raw>CUT_LINE?CUT_LINE:raw;}
  return[r1,r2,r3,r4].filter(v=>v!=null).reduce((s,v)=>s+v,0);
}
function playerLiveToPar(name){
  if(MC.has(name)){const r1=R1[name]??0,r2=R2[name]??0;const raw=r1+r2;return(raw>CUT_LINE?CUT_LINE:raw)-PAR*2;}
  const finished=[R1[name],R2[name],R3[name],R4[name]].filter(v=>v!=null);
  let tp=finished.reduce((s,v)=>s+v,0)-PAR*finished.length;
  // Add live R4 progress
  if(R4[name]==null&&R4_LIVE[name])tp+=R4_LIVE[name].tp;
  // Add live R3 progress (shouldn't apply now but keep for safety)
  else if(R3[name]==null&&R3_LIVE[name])tp+=R3_LIVE[name].tp;
  return tp;
}
function playerStatus(name){
  if(MC.has(name))return{status:"mc",label:"MC"};
  if(R4[name]!=null)return{status:"done",label:"F"};
  if(R4_LIVE[name])return{status:"live",label:"Thru "+R4_LIVE[name].thru,thru:R4_LIVE[name].thru,today:R4_LIVE[name].tp};
  if(R4_TEE[name])return{status:"tee",label:R4_TEE[name]};
  if(R3[name]!=null)return{status:"waiting",label:"—"};
  return{status:"unknown",label:"—"};
}
function playerRounds(name){return{r1:R1[name]??null,r2:R2[name]??null,r3:R3[name]??null,r4:R4[name]??null}}
function isMC(name){return MC.has(name)}

// Masters LB using best available data (all rounds + live)
const allPlayers=new Set([...Object.keys(R1),...Object.keys(R2),...Object.keys(R3),...Object.keys(R4)]);
const mastersLB=[...allPlayers].map(name=>{
  const r1=R1[name]??null,r2=R2[name]??null,r3=R3[name]??null,r4=R4[name]??null;
  const mc=MC.has(name);
  const finishedRounds=[r1,r2,r3,r4].filter(v=>v!=null);
  const rawTotal=finishedRounds.reduce((s,v)=>s+v,0);
  const rounds=finishedRounds.length;
  const total=mc&&rawTotal>CUT_LINE?CUT_LINE:rawTotal;
  let toPar=total-PAR*rounds;
  // Add live R4 progress
  const r4live=R4_LIVE[name];
  const onCourse=r4==null&&r4live!=null;
  if(onCourse)toPar+=r4live.tp;
  const ps=playerStatus(name);
  const thru=ps.status==="done"?"F":ps.status==="live"?r4live.thru:ps.status==="tee"?ps.label:null;
  const today=r4!=null?(r4-PAR):onCourse?r4live.tp:null;
  return{name,r1,r2,r3,r4,total,toPar,rounds,mc,thru,today,onCourse,ps};
}).filter(e=>e.rounds>0).sort((a,b)=>a.toPar-b.toPar||a.total-b.total);

const poolPlayerSet=new Set();
let useAll6=false;

function buildTeams(){
  const teams=RAW.map(raw=>{
    const players=raw.p.map(p=>{
      const name=normalize(p);
      poolPlayerSet.add(name);
      const r1=R1[name]??null,r2=R2[name]??null,r3=R3[name]??null,r4=R4[name]??null;
      const mc=MC.has(name);
      const finishedRounds=[r1,r2,r3,r4].filter(v=>v!=null);
      const rounds=finishedRounds.length;
      const rawTotal=finishedRounds.reduce((s,v)=>s+v,0);
      const total=mc&&rawTotal>CUT_LINE?CUT_LINE:rawTotal;
      const r4live=R4_LIVE[name];
      const onCourse=r4==null&&r4live!=null&&!mc;
      let toPar=rounds>0?total-PAR*rounds:null;
      if(onCourse&&toPar!=null)toPar+=r4live.tp;
      const country=COUNTRIES[name]||"US";
      const entry=mastersLB.find(e=>e.name===name);
      const posStr=entry?entry.posStr:"—";
      const r1pos=r1PosMap[name]||99;
      const curPos=entry?entry.pos:99;
      const ps=playerStatus(name);
      const today=r4!=null?(r4-PAR):onCourse?r4live.tp:null;
      return{name,r1,r2,r3,r4,total,toPar,country,posStr,r1pos,curPos,rounds,mc,onCourse,ps,today};
    });
    const sorted=[...players].sort((a,b)=>{
      if(a.total===0&&b.total===0)return 0;if(a.total===0)return 1;if(b.total===0)return -1;
      return a.toPar-b.toPar;
    });
    const countN=useAll6?6:4;
    const counting=sorted.slice(0,countN);
    const dropped=sorted.slice(countN);
    const bestTotal=counting.reduce((s,p)=>s+(p.total||0),0);
    const bestRounds=counting.reduce((s,p)=>s+p.rounds,0);
    // Use live-aware toPar so in-progress R3 is reflected
    const bestToPar=counting.reduce((s,p)=>s+(p.toPar||0),0);

    // R1-only best4 for movement
    const r1sorted=[...players].sort((a,b)=>(a.r1||999)-(b.r1||999));
    const r1count=r1sorted.slice(0,countN);
    const r1total=r1count.reduce((s,p)=>s+(p.r1||0),0);
    const r1toPar=r1total-PAR*countN;

    const livCount=sorted.filter(p=>LIV.has(p.name)).length;
    const champCount=sorted.filter(p=>PAST_CHAMPS[p.name]).length;
    const heroCount=sorted.filter(p=>AUGUSTA_HEROES.has(p.name)).length;
    const all6Total=sorted.reduce((s,p)=>s+(p.total||0),0);
    const all6Rounds=sorted.reduce((s,p)=>s+p.rounds,0);

    return{owner:raw.o,team:raw.t||raw.o,players:sorted,counting,dropped,
      bestTotal,bestToPar,bestRounds,all6Total,all6Rounds,r1toPar,
      livCount,champCount,heroCount};
  });
  teams.sort((a,b)=>a.bestToPar-b.bestToPar||a.bestTotal-b.bestTotal);
  let tp=1;
  for(let i=0;i<teams.length;i++){
    if(i>0&&teams[i].bestToPar>teams[i-1].bestToPar)tp=i+1;
    teams[i].pos=tp;
  }
  // R1 positions for movement
  const r1teams=[...teams].sort((a,b)=>a.r1toPar-b.r1toPar);
  let rtp=1;
  for(let i=0;i<r1teams.length;i++){
    if(i>0&&r1teams[i].r1toPar>r1teams[i-1].r1toPar)rtp=i+1;
    r1teams[i].r1pos=rtp;
  }
  return teams;
}

  h+=`<div class="footer">2026 Masters Pool · <a href="index.html">Open Predictor</a><br>Scores via ESPN · ${LAST_UPDATED}</div>`;
